name: Attach .mcpb to release

# Builds the Claude Desktop extension bundle (figma-prototype-mcp.mcpb) and
# attaches it to the GitHub release, so the README's "download from the latest
# release" instructions always work.
#
# Triggers:
#   - release: published  -> runs automatically whenever a release is published
#   - workflow_dispatch    -> manual run; pass a tag to (re)attach to an existing
#                             release (e.g. to backfill older releases)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the .mcpb to (e.g. v0.40.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  attach:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build .mcpb bundle
        run: npm run pack:dxt

      - name: Resolve target tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload .mcpb to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            figma-prototype-mcp.mcpb --clobber
